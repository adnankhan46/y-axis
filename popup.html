<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y-Axis</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Y-Axis</h1>
            <p class="subtitle">Navigate through long Chats</p>
            <div id="user-icon" class="popup-user-icon" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <div id="user-tooltip" class="popup-user-tooltip"></div>
            </div>
        </header>

        <div class="shortcuts-section">
            <h2>Keyboard Shortcuts</h2>
            <ul class="shortcuts-list">
                <li>
                    <span class="label">Toggle Panel</span>
                    <span class="keys">
                        <kbd>Cmd/Ctrl</kbd> + <kbd>;</kbd>
                    </span>
                </li>
                <li>
                    <span class="label">Navigation</span>
                    <span class="keys">
                        <kbd>↑</kbd> / <kbd>↓</kbd> or <kbd>j</kbd> / <kbd>k</kbd>
                    </span>
                </li>
                <li>
                    <span class="label">Select</span>
                    <span class="keys">
                        <kbd>Enter</kbd>
                    </span>
                </li>
                <li>
                    <span class="label">View Modes</span>
                    <span class="keys">
                        <kbd>←</kbd> (Prompts) / <kbd>→</kbd> (All)
                    </span>
                </li>
                <li>
                    <span class="label">Close</span>
                    <span class="keys">
                        <kbd>Esc</kbd>
                    </span>
                </li>
            </ul>
        </div>

        <footer>
            <p>Works on ChatGPT, Gemini, Claude, DeepSeek</p>
            <span class="built-by">Built by <a href="https://adnankhan93.vercel.app"
                    target="_blank">@adnankhan</a></span>
        </footer>
    </div>

    <script src="popup.js"></script>
    <script src="oneko.js"></script>
</body>

</html>
